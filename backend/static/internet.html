<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>VMN Pulse — Internet</title>
<link rel="stylesheet" href="/static/css/style.css?v=2.2">
<link rel="icon" type="image/svg+xml" href="/static/img/logo.svg">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.5.0/chart.umd.min.js"></script>
</head>
<body>
  <div class="topbar topbar-vmn">
    <div class="topbar-brand">
      <img src="/static/img/logo.svg" alt="VMN Tech">
      <div class="brand-text">
        <span class="brand-name">VMN <span class="gold">Pulse</span></span>
        <span class="brand-company">VMN Tech</span>
      </div>
    </div>
    <div class="topbar-actions">
      <button class="btn" onclick="location.href='/'">⬅ Voltar para a tabela</button>
      <button class="btn btn-danger" id="logout-btn">Sair</button>
    </div>
  </div>

  <div class="toolbar">
    <label class="text-muted" style="font-size:13px;">Período:</label>
    <select id="hours-select" style="padding:6px 10px; border:1px solid var(--grid-line); border-radius:4px;">
      <option value="6">Últimas 6h</option>
      <option value="24" selected>Últimas 24h</option>
      <option value="72">Últimos 3 dias</option>
      <option value="168">Últimos 7 dias</option>
    </select>
    <span id="test-info" class="text-muted" style="font-size:13px;"></span>
    <span style="flex:1"></span>
    <button class="btn btn-primary admin-only" id="run-now-btn" style="display:none;">▶ Testar agora</button>
  </div>

  <div style="padding:18px;">
    <div id="cards" style="display:grid; grid-template-columns:repeat(auto-fit, minmax(180px, 1fr)); gap:14px; margin-bottom:18px;"></div>

    <div style="background:#fff; border:1px solid var(--grid-line); border-radius:8px; padding:16px; margin-bottom:18px;">
      <h3 style="margin-top:0; font-size:14px;">Velocidade (Mbps)</h3>
      <canvas id="chart-speed" height="80"></canvas>
    </div>
    <div style="background:#fff; border:1px solid var(--grid-line); border-radius:8px; padding:16px; margin-bottom:18px;">
      <h3 style="margin-top:0; font-size:14px;">Latência (ms)</h3>
      <canvas id="chart-ping" height="70"></canvas>
    </div>

    <div style="background:#fff; border:1px solid var(--grid-line); border-radius:8px; padding:16px;">
      <h3 style="margin-top:0; font-size:14px;">Testes recentes</h3>
      <table class="log-table">
        <thead><tr><th>Data/hora</th><th>Status</th><th>Download</th><th>Upload</th><th>Ping</th><th>IP de saída</th><th>Servidor</th></tr></thead>
        <tbody id="tests-table"></tbody>
      </table>
    </div>
  </div>

  <script src="/static/js/api.js?v=2.2"></script>
  <script>
    requireAuth();
    document.getElementById("logout-btn").addEventListener("click", () => {
      API.clearToken();
      window.location.href = "/login.html";
    });

    const STATUS = {
      ok: { label: "Normal", cls: "online" },
      slow: { label: "Lenta", cls: "warning" },
      error: { label: "Falha no teste", cls: "offline" },
    };

    let speedChart, pingChart, thresholds = {};

    function card(title, value, unit, sub, color) {
      return `<div style="background:#fff; border:1px solid var(--grid-line); border-top:3px solid ${color}; border-radius:8px; padding:14px;">
        <div class="text-muted" style="font-size:12px;">${title}</div>
        <div style="font-size:26px; font-weight:800;" class="mono">${value ?? "-"}<span style="font-size:13px; font-weight:400;"> ${unit}</span></div>
        <div class="text-muted" style="font-size:11px;">${sub || ""}</div>
      </div>`;
    }

    async function loadLatest() {
      const data = await API.get("/api/wan/latest");
      thresholds = data.thresholds;
      document.getElementById("test-info").textContent =
        `Teste automático a cada ${thresholds.interval_minutes} min` + (thresholds.enabled ? "" : " (DESATIVADO)");

      const r = data.result;
      const cardsEl = document.getElementById("cards");
      if (!r) {
        cardsEl.innerHTML = '<p class="text-muted">Nenhum teste executado ainda. Aguarde o primeiro ciclo ou clique em "Testar agora".</p>';
        return;
      }
      const s = STATUS[r.status] || STATUS.error;
      const when = new Date(r.timestamp + "Z").toLocaleString("pt-BR");
      cardsEl.innerHTML =
        card("Status da internet", s.label, "", `Último teste: ${when}`, r.status === "ok" ? "var(--green)" : r.status === "slow" ? "var(--yellow)" : "var(--red)") +
        card("Download", r.download_mbps, "Mbps", `mínimo esperado: ${thresholds.min_download_mbps}`, "var(--vmn-green, #22c55e)") +
        card("Upload", r.upload_mbps, "Mbps", `mínimo esperado: ${thresholds.min_upload_mbps}`, "var(--vmn-gold, #d4af37)") +
        card("Ping", r.ping_ms, "ms", `máximo esperado: ${thresholds.max_ping_ms}`, "var(--accent)") +
        card("IP de saída", r.wan_ip || "-", "", "por qual link o teste saiu", "var(--vmn-blood, #8b0000)") +
        card("Provedor / Servidor", r.isp || "-", "", r.server_name || "", "var(--grid-line)");
    }

    async function loadHistory() {
      const hours = document.getElementById("hours-select").value;
      const rows = await API.get(`/api/wan/history?hours=${hours}`);

      const labels = rows.map((r) => new Date(r.timestamp + "Z").toLocaleString("pt-BR", { day: "2-digit", month: "2-digit", hour: "2-digit", minute: "2-digit" }));

      renderTable(rows);

      if (typeof Chart === "undefined") {
        console.warn("Chart.js não carregou; exibindo apenas a tabela.");
        return;
      }
      if (speedChart) speedChart.destroy();
      if (pingChart) pingChart.destroy();

      speedChart = new Chart(document.getElementById("chart-speed"), {
        type: "line",
        data: {
          labels,
          datasets: [
            { label: "Download", data: rows.map((r) => r.download_mbps), borderColor: "#16a34a", backgroundColor: "rgba(22,163,74,0.08)", fill: true, tension: 0.25, pointRadius: 2 },
            { label: "Upload", data: rows.map((r) => r.upload_mbps), borderColor: "#d4af37", backgroundColor: "rgba(212,175,55,0.08)", fill: true, tension: 0.25, pointRadius: 2 },
          ],
        },
      });

      pingChart = new Chart(document.getElementById("chart-ping"), {
        type: "line",
        data: {
          labels,
          datasets: [
            { label: "Ping (ms)", data: rows.map((r) => r.ping_ms), borderColor: "#dc2626", backgroundColor: "rgba(220,38,38,0.08)", fill: true, tension: 0.25, pointRadius: 2 },
          ],
        },
        options: { plugins: { legend: { display: false } } },
      });

    }

    function renderTable(rows) {
      document.getElementById("tests-table").innerHTML = rows
        .slice()
        .reverse()
        .slice(0, 50)
        .map((r) => {
          const s = STATUS[r.status] || STATUS.error;
          return `<tr>
            <td>${new Date(r.timestamp + "Z").toLocaleString("pt-BR")}</td>
            <td><span class="status-pill status-${s.cls}">${s.label}</span>${r.error_message ? ` <span class="text-muted" style="font-size:11px;">${r.error_message}</span>` : ""}</td>
            <td class="mono">${r.download_mbps ?? "-"} Mbps</td>
            <td class="mono">${r.upload_mbps ?? "-"} Mbps</td>
            <td class="mono">${r.ping_ms ?? "-"} ms</td>
            <td class="mono">${r.wan_ip || "-"}</td>
            <td class="text-muted">${r.server_name || "-"}</td>
          </tr>`;
        })
        .join("") || '<tr><td colspan="7" class="text-muted">Sem testes no período.</td></tr>';
    }

    async function init() {
      try {
        const me = await API.get("/api/auth/me");
        if (me.role === "admin") document.getElementById("run-now-btn").style.display = "";
      } catch (e) {}
      await loadLatest();
      await loadHistory();
    }

    document.getElementById("hours-select").addEventListener("change", loadHistory);
    document.getElementById("run-now-btn").addEventListener("click", async () => {
      const btn = document.getElementById("run-now-btn");
      btn.disabled = true;
      btn.textContent = "Testando... (~40s)";
      try {
        await API.post("/api/wan/run", {});
        await loadLatest();
        await loadHistory();
      } catch (err) {
        alert(err.message);
      } finally {
        btn.disabled = false;
        btn.textContent = "▶ Testar agora";
      }
    });

    init();
    setInterval(() => { loadLatest(); }, 60000);
  </script>
</body>
</html>
