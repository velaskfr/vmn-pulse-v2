<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>VMN Pulse — Entrar</title>
<link rel="stylesheet" href="/static/css/style.css">
<link rel="icon" type="image/svg+xml" href="/static/img/logo.svg">
</head>
<body class="login-dark">
  <div class="login-wrap login-wrap-dark">
    <div class="login-card login-card-dark">
      <img src="/static/img/logo.svg" alt="VMN Tech" class="login-logo">
      <h1 class="login-brand">VMN <span class="gold">Pulse</span></h1>
      <p class="subtitle-dark">by VMN Tech · Monitoramento de rede em tempo real</p>
      <form id="login-form">
        <div class="form-row">
          <label>Usuário</label>
          <input type="text" id="username" autocomplete="username" required>
        </div>
        <div class="form-row">
          <label>Senha</label>
          <input type="password" id="password" autocomplete="current-password" required>
        </div>
        <button type="submit" class="btn btn-pulse">Entrar</button>
        <div class="login-error" id="login-error"></div>
      </form>
    </div>
  </div>

  <script src="/static/js/api.js"></script>
  <script>
    if (API.token()) window.location.href = "/";

    document.getElementById("login-form").addEventListener("submit", async (e) => {
      e.preventDefault();
      const username = document.getElementById("username").value.trim();
      const password = document.getElementById("password").value;
      const errorEl = document.getElementById("login-error");
      errorEl.textContent = "";
      try {
        const resp = await fetch("/api/auth/login", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ username, password }),
        });
        if (!resp.ok) {
          const data = await resp.json().catch(() => ({}));
          throw new Error(data.detail || "Usuário ou senha inválidos");
        }
        const data = await resp.json();
        API.setToken(data.access_token);
        window.location.href = "/";
      } catch (err) {
        errorEl.textContent = err.message;
      }
    });
  </script>
</body>
</html>
